<!DOCTYPE html>
<html>
<head>
    <title>Edit Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">✏️ Edit Contact</h3>

        <form method="POST">
            <div class="mb-3">
                <label>First Name</label>
                <input name="firstname" value="{{ contact[1] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Last Name</label>
                <input name="lastname" value="{{ contact[2] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Gender</label>
                <select name="gender" class="form-control">
                    <option {% if contact[3]=='Male' %}selected{% endif %}>Male</option>
                    <option {% if contact[3]=='Female' %}selected{% endif %}>Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input name="age" value="{{ contact[4] }}" type="number" class="form-control">
            </div>

            <div class="mb-3">
                <label>Address</label>
                <input name="address" value="{{ contact[5] }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Contact</label>
                <input name="contact" value="{{ contact[6] }}" class="form-control">
            </div>

            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary">⬅ Back</a>
                <button type="submit" class="btn btn-primary">Update</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
